# Docker Compose for local demo and smoke testing only.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: selqor_forge
      POSTGRES_USER: selqor
      POSTGRES_PASSWORD: selqor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selqor -d selqor_forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8787:8787"
    environment:
      DATABASE_URL: postgresql://selqor:selqor@db:5432/selqor_forge
      FORGE_PRODUCTION: "false"
    volumes:
      - dashboard_state:/home/selqor/dashboard
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  dashboard_state:
