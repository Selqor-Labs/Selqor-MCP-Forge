name: Bug report
description: Report a defect or regression in Selqor Forge
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough detail for us to reproduce the problem quickly.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact it had.
      placeholder: The dashboard showed...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest sequence that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Selqor Forge version
      placeholder: 0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, database/storage backend, and anything else relevant.
      placeholder: Windows 11, Python 3.11, local SQLite...
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any useful traces, screenshots, or API responses.
      render: shell
