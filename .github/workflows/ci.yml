name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: selqor_forge_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/selqor_forge_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pip-audit
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy --follow-imports=skip --ignore-missing-imports --disable-error-code=misc src/selqor_forge/dashboard/middleware.py src/selqor_forge/dashboard/routes/auth_routes.py src/selqor_forge/dashboard/routes/org_routes.py
      - name: Run backend tests
        run: pytest -q
      - name: pip-audit
        run: pip-audit
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/dashboard/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend smoke tests
        run: npm run test
      - name: Build frontend
        run: npm run build
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start local demo stack
        run: docker compose up -d --build
      - name: Wait for dashboard readiness
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8787/health/ready > ready.json; then
              cat ready.json
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Stop stack
        if: always()
        run: docker compose down -v
